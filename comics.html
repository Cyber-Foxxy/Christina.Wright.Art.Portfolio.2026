<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comics | Christina Wright</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="gallery-header">
  <a class="back-home" href="index.html">← Back Home</a>

  <h1>Comics & Sequential Art</h1>

  <p>
    Hand-drawn comics, manga-inspired storytelling,
    watercolor concept panels, and pages from
    <strong>The Skywhale Chronicles: The Bullie Brigade.</strong>
  </p>
</header>

<main class="gallery-page">

  <div class="gallery-grid">

    <div class="gallery-item">
      <img src="images/20250306_185354.jpg" alt="Skywhale Chronicles comic page 1">
    </div>

    <div class="gallery-item">
      <img src="images/20250306_185527.jpg" alt="Skywhale Chronicles comic page 2">
    </div>

    <div class="gallery-item">
      <img src="images/20250306_185639.jpg" alt="Skywhale Chronicles comic page 3">
    </div>

    <div class="gallery-item">
      <img src="images/20250505_154827.jpg" alt="Manga style comic page">
    </div>

    <div class="gallery-item">
      <img src="images/20250505_154839.jpg" alt="Manga ink comic page">
    </div>

    <div class="gallery-item">
      <img src="images/comics thumbnail.jpg" alt="Watercolor comic illustration">
    </div>

  </div>

</main>

<div class="lightbox" id="lightbox">
  <span class="close-lightbox">&times;</span>
  <img class="lightbox-img" id="lightboxImg">
</div>

<script>
const galleryImages = document.querySelectorAll(".gallery-item img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");
const closeBtn = document.querySelector(".close-lightbox");

galleryImages.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  });
});

closeBtn.addEventListener("click", () => {
  lightbox.style.display = "none";
});

lightbox.addEventListener("click", (e) => {
  if (e.target === lightbox) {
    lightbox.style.display = "none";
  }
});
</script>

</body>
</html>
